<!DOCTYPE html>
<html>
<head>
<title>Generador de Icono PWA</title>
<style>
  body { background: #1a1a2e; color: white; font-family: Arial; text-align: center; padding: 40px; }
  canvas { border: 2px solid #444; margin: 20px; border-radius: 16px; }
  button { background: #22d3ee; color: black; border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 10px; cursor: pointer; margin: 10px; }
  button:hover { background: #06b6d4; }
  .preview { display: inline-block; margin: 10px; }
  .preview img { border-radius: 22%; border: 2px solid #444; }
  .preview p { font-size: 12px; color: #888; }
</style>
</head>
<body>
<h1>🎯 Generador de Icono PWA - Tinkazo</h1>
<p>Este generador crea tu icono con el padding correcto para iOS y Android</p>

<div>
  <label>Color de fondo: </label>
  <select id="bgColor" onchange="drawIcon()">
    <option value="#020617" selected>Azul oscuro (app)</option>
    <option value="#ffffff">Blanco</option>
    <option value="#1e293b">Gris oscuro</option>
    <option value="#dc2626">Rojo</option>
  </select>
  &nbsp;&nbsp;
  <label>Padding (%): </label>
  <input type="range" id="padding" min="10" max="40" value="20" oninput="drawIcon()">
  <span id="padVal">20%</span>
</div>

<br>
<canvas id="canvas" width="512" height="512"></canvas>

<br>
<button onclick="downloadAll()">⬇️ Descargar Todos los Tamaños</button>

<div id="previews"></div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const img = new Image();
img.crossOrigin = 'anonymous';

// Load the current logo
img.onload = () => drawIcon();
img.src = '/icons/icon-512.png';

function drawIcon() {
  const bg = document.getElementById('bgColor').value;
  const padPct = parseInt(document.getElementById('padding').value);
  document.getElementById('padVal').textContent = padPct + '%';
  
  const size = 512;
  canvas.width = size;
  canvas.height = size;
  
  // Fill background
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, size, size);
  
  // Draw logo centered with padding
  const pad = size * (padPct / 100);
  const logoSize = size - (pad * 2);
  
  if (img.complete && img.naturalWidth > 0) {
    ctx.drawImage(img, pad, pad, logoSize, logoSize);
  }
}

function downloadAll() {
  const sizes = [48, 72, 96, 128, 192, 256, 512];
  const previewsDiv = document.getElementById('previews');
  previewsDiv.innerHTML = '<h3>Iconos generados:</h3>';
  
  sizes.forEach(size => {
    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = size;
    tempCanvas.height = size;
    const tempCtx = tempCanvas.getContext('2d');
    
    // Draw scaled version
    tempCtx.drawImage(canvas, 0, 0, size, size);
    
    // Create download link
    const link = document.createElement('a');
    link.download = `icon-${size}.png`;
    link.href = tempCanvas.toDataURL('image/png');
    link.click();
    
    // Show preview
    const div = document.createElement('div');
    div.className = 'preview';
    const previewImg = document.createElement('img');
    previewImg.src = tempCanvas.toDataURL('image/png');
    previewImg.width = Math.min(size, 128);
    previewImg.height = Math.min(size, 128);
    const label = document.createElement('p');
    label.textContent = `${size}x${size}`;
    div.appendChild(previewImg);
    div.appendChild(label);
    previewsDiv.appendChild(div);
  });
}
</script>
</body>
</html>
